<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المتجر | أثر</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="site-header" class="site-header"></header>

<main>
  <div class="container">
    <div class="breadcrumbs"><a href="index.html">الرئيسية</a> / <span id="bc-current">المتجر</span></div>
    <div class="section-head" style="margin-bottom:10px;">
      <div><span class="eyebrow">كل القطع</span><h2 id="page-title">تصفّحي المتجر</h2></div>
    </div>

    <div class="products-toolbar">
      <div class="filter-pills" id="filter-pills"></div>
      <select class="sort-select" id="sort-select">
        <option value="default">الترتيب الافتراضي</option>
        <option value="price-asc">السعر: من الأقل للأعلى</option>
        <option value="price-desc">السعر: من الأعلى للأقل</option>
        <option value="rating">الأعلى تقييمًا</option>
      </select>
    </div>

    <div class="product-grid" id="products-grid"></div>
  </div>
</main>

<footer id="site-footer" class="site-footer"></footer>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/layout.js"></script>
<script>
renderHeader('shop');

const params = new URLSearchParams(location.search);
let activeCat = params.get('cat') || 'all';

function renderPills(){
  const all = [{key:'all', label:'الكل'}, ...CATEGORIES];
  document.getElementById('filter-pills').innerHTML = all.map(c => `
    <button class="pill ${activeCat===c.key?'active':''}" data-cat="${c.key}">${c.label}</button>
  `).join('');
  document.querySelectorAll('.pill').forEach(btn => btn.addEventListener('click', () => {
    activeCat = btn.dataset.cat;
    renderPills();
    renderGrid();
    const t = activeCat==='all' ? 'تصفّحي المتجر' : getCategoryLabel(activeCat);
    document.getElementById('page-title').textContent = t;
    document.getElementById('bc-current').textContent = t;
  }));
}

function renderGrid(){
  let list = activeCat==='all' ? PRODUCTS.slice() : PRODUCTS.filter(p => p.category===activeCat);
  const sort = document.getElementById('sort-select').value;
  if(sort==='price-asc') list.sort((a,b)=>a.price-b.price);
  if(sort==='price-desc') list.sort((a,b)=>b.price-a.price);
  if(sort==='rating') list.sort((a,b)=>b.rating-a.rating);

  document.getElementById('products-grid').innerHTML = list.length ? list.map(renderProductCard).join('') :
    `<p style="grid-column:1/-1; text-align:center; padding:60px 0; color:var(--rose);">لا توجد منتجات في هذه الفئة حاليًا.</p>`;
}

function renderProductCard(p){
  const badgeHtml = p.badge ? `<span class="badge ${p.badgeType==='gold'?'gold':''}">${p.badge}</span>` : '';
  const priceHtml = p.oldPrice
    ? `<span class="price">${formatPrice(p.price)}<span class="old">${formatPrice(p.oldPrice)}</span></span>`
    : `<span class="price">${formatPrice(p.price)}</span>`;
  return `
  <div class="product-card">
    <a href="product.html?id=${p.id}" class="product-media">
      ${badgeHtml}
      ${iconFor(p.category)}
    </a>
    <div class="product-info">
      <span class="product-cat">${getCategoryLabel(p.category)}</span>
      <a href="product.html?id=${p.id}"><h3 class="product-name">${p.name}</h3></a>
      <div class="product-price">
        ${priceHtml}
        <button class="add-btn" aria-label="أضف إلى السلة" onclick="addToCart('${p.id}')">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

document.getElementById('sort-select').addEventListener('change', renderGrid);

renderPills();
renderGrid();
if(activeCat!=='all'){
  document.getElementById('page-title').textContent = getCategoryLabel(activeCat);
  document.getElementById('bc-current').textContent = getCategoryLabel(activeCat);
}
</script>
</body>
</html>
