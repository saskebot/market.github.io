<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج | أثر</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="site-header" class="site-header"></header>

<main>
  <div class="container">
    <div class="breadcrumbs">
      <a href="index.html">الرئيسية</a> / <a href="products.html" id="bc-cat">المتجر</a> / <span id="bc-name"></span>
    </div>

    <div class="pd-grid" id="pd-root"></div>

    <section class="tabs container" style="padding:0;">
      <div class="tab-heads">
        <button class="tab-head active" data-tab="desc">الوصف</button>
        <button class="tab-head" data-tab="specs">المواصفات</button>
        <button class="tab-head" data-tab="reviews">التقييمات (<span id="rev-count">0</span>)</button>
      </div>
      <div class="tab-panel active" id="panel-desc"></div>
      <div class="tab-panel" id="panel-specs"></div>
      <div class="tab-panel" id="panel-reviews"></div>
    </section>

    <section class="related section">
      <h3 class="stroke-underline">قد يعجبك أيضًا</h3>
      <div class="product-grid" id="related-grid"></div>
    </section>
  </div>
</main>

<footer id="site-footer" class="site-footer"></footer>

<script src="js/icons.js"></script>
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/layout.js"></script>
<script>
renderHeader('shop');

const id = new URLSearchParams(location.search).get('id');
const p = getProduct(id) || PRODUCTS[0];
let qty = 1;

document.title = `${p.name} | أثر`;
document.getElementById('bc-cat').textContent = getCategoryLabel(p.category);
document.getElementById('bc-cat').href = `products.html?cat=${p.category}`;
document.getElementById('bc-name').textContent = p.name;

const badgeHtml = p.badge ? `<span class="badge ${p.badgeType==='gold'?'gold':''}" style="position:static; display:inline-block; margin-bottom:14px;">${p.badge}</span>` : '';
const priceHtml = p.oldPrice
  ? `${formatPrice(p.price)} <span class="old" style="font-size:16px;">${formatPrice(p.oldPrice)}</span>`
  : formatPrice(p.price);

document.getElementById('pd-root').innerHTML = `
  <div class="pd-media">${iconFor(p.category)}</div>
  <div class="pd-info">
    ${badgeHtml}
    <div class="pd-cat">${getCategoryLabel(p.category)}</div>
    <h1 class="pd-title">${p.name}</h1>
    <div class="pd-price">${priceHtml}</div>
    <p class="pd-desc">${p.desc}</p>
    <ul class="pd-meta">
      ${Object.entries(p.meta).map(([k,v]) => `<li><b>${k}</b><span>${v}</span></li>`).join('')}
    </ul>
    <div class="qty-row">
      <span style="font-weight:700; font-size:14px;">الكمية</span>
      <div class="qty-box">
        <button id="qty-minus">−</button>
        <span id="qty-val">1</span>
        <button id="qty-plus">+</button>
      </div>
    </div>
    <div class="pd-actions">
      <button class="btn btn-primary" id="add-cart-btn">أضيفي إلى السلة</button>
      <a class="btn btn-outline" href="cart.html">إتمام الشراء الآن</a>
    </div>
    <div style="display:flex; align-items:center; gap:8px; color:var(--rose); font-size:13px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 12v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6M12 2v13M6 9l6-6 6 6"/></svg>
      شحن مجاني للطلبات فوق ${formatPrice(FREE_SHIPPING_THRESHOLD)}
    </div>
  </div>
`;

document.getElementById('qty-plus').onclick = () => { qty++; document.getElementById('qty-val').textContent = qty; };
document.getElementById('qty-minus').onclick = () => { qty = Math.max(1, qty-1); document.getElementById('qty-val').textContent = qty; };
document.getElementById('add-cart-btn').onclick = () => addToCart(p.id, qty);

document.getElementById('panel-desc').innerHTML = `<p>${p.desc}</p>
  <p>كل قطعة من "أثر" تُغلَّف يدويًا في صندوق مبطّن بلون النبيذي، مع بطاقة تحمل توقيع المجموعة، لتصلك التجربة كاملة من أول لحظة فتح.</p>`;

document.getElementById('panel-specs').innerHTML = `
  <ul class="pd-meta">${Object.entries(p.meta).map(([k,v]) => `<li><b>${k}</b><span>${v}</span></li>`).join('')}
  <li><b>الفئة</b><span>${getCategoryLabel(p.category)}</span></li>
  <li><b>التوصيل</b><span>2-4 أيام عمل داخل الضفة الغربية</span></li></ul>
`;

// ===== التقييمات =====
const reviews = REVIEW_POOL.slice(0, p.reviews || 2).map((r,i) => ({...r, stars: 4 + (i%2)}));
document.getElementById('rev-count').textContent = reviews.length;

function renderReviews(){
  document.getElementById('panel-reviews').innerHTML = `
    <div style="display:flex; align-items:center; gap:16px; margin-bottom:22px;">
      <h2 style="font-size:34px;">${p.rating}</h2>
      <div>
        <div class="stars">★★★★★</div>
        <div style="font-size:13px; color:var(--rose);">بناءً على ${reviews.length} تقييمات</div>
      </div>
    </div>
    <div id="reviews-list">
      ${reviews.map(r => `
        <div class="review">
          <div class="avatar">${r.name[0]}</div>
          <div>
            <div class="review-name">${r.name}</div>
            <div class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
            <div class="review-text">${r.text}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <h4 style="margin-top:28px; font-size:16px;">أضيفي تقييمك</h4>
    <form class="review-form" id="review-form">
      <div class="rating-input" id="rating-input">
        ${[1,2,3,4,5].map(n => `<span data-val="${n}">★</span>`).join('')}
      </div>
      <input type="text" placeholder="الاسم" required id="rev-name">
      <textarea rows="3" placeholder="شاركي تجربتك مع هذا المنتج..." required id="rev-text"></textarea>
      <button class="btn btn-gold btn-block" type="submit">نشر التقييم</button>
    </form>
  `;

  let selectedStars = 5;
  document.querySelectorAll('#rating-input span').forEach(s => {
    s.classList.toggle('active', +s.dataset.val <= selectedStars);
    s.addEventListener('click', () => {
      selectedStars = +s.dataset.val;
      document.querySelectorAll('#rating-input span').forEach(x => x.classList.toggle('active', +x.dataset.val <= selectedStars));
    });
  });

  document.getElementById('review-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('rev-name').value.trim();
    const text = document.getElementById('rev-text').value.trim();
    if(!name || !text) return;
    reviews.unshift({ name, text, stars: selectedStars });
    document.getElementById('rev-count').textContent = reviews.length;
    renderReviews();
    showToast('شكرًا لمشاركتك تقييمك');
  });
}
renderReviews();

// ===== Tabs =====
document.querySelectorAll('.tab-head').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-head').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(pn => pn.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ===== منتجات ذات صلة =====
const related = PRODUCTS.filter(x => x.category===p.category && x.id!==p.id).slice(0,3);
document.getElementById('related-grid').innerHTML = related.map(rp => {
  const b = rp.badge ? `<span class="badge ${rp.badgeType==='gold'?'gold':''}">${rp.badge}</span>` : '';
  const pr = rp.oldPrice ? `<span class="price">${formatPrice(rp.price)}<span class="old">${formatPrice(rp.oldPrice)}</span></span>` : `<span class="price">${formatPrice(rp.price)}</span>`;
  return `
  <div class="product-card">
    <a href="product.html?id=${rp.id}" class="product-media">${b}${iconFor(rp.category)}</a>
    <div class="product-info">
      <span class="product-cat">${getCategoryLabel(rp.category)}</span>
      <a href="product.html?id=${rp.id}"><h3 class="product-name">${rp.name}</h3></a>
      <div class="product-price">${pr}
        <button class="add-btn" onclick="addToCart('${rp.id}')"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>
      </div>
    </div>
  </div>`;
}).join('');
</script>
</body>
</html>
